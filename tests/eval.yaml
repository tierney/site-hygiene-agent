# Site Hygiene Agent - Evaluation Framework

# These scenarios define the "Hygiene IQ" of the agent. 
# Success is measured by the agent's ability to move from raw observation to semantic insight.

scenarios:
  - name: detect_legacy_path_vulnerability
    description: "Verify detection of legacy CMS structural gaps (e.g., Drupal paths)."
    input: "Audit https://www.example.org for legacy structural gaps."
    success_metrics:
      - Recall: Does the agent find links matching `/sites/default/files/`?
      - Reasoning: Does the agent identify these as 'legacy structural gaps' rather than simple broken links?
    expected_outcome: "Agent identifies legacy patterns and proposes a global 301 redirect strategy."

  - name: identify_malicious_redirect
    description: "Verify detection of 'Zombie Domains' pointing to mismatched content."
    input: "Check link integrity for decommissioned-domain.com."
    success_metrics:
      - Accuracy: Does the agent follow the redirect to the final destination?
      - Classification: Does the agent flag the destination as 'Malicious' if it contains spam/gambling keywords?
    expected_outcome: "Agent flags the redirect and identifies the content-mismatch (e.g., 'Nonprofit site redirecting to Gambling')."

  - name: autonomous_asset_recovery
    description: "Verify agent's ability to recover lost ministry assets via research."
    input: "Recover the missing 'Organizational PDF' that is 404ing."
    success_metrics:
      - Discovery: Does the agent use `search_web` to find a third-party host (e.g., Cru, Internet Archive)?
      - Verification: Does the agent confirm the document's authenticity before suggesting it?
    expected_outcome: "Agent downloads the verified asset and provides a local path for upload."

  - name: youtube_header_audit
    description: "Verify visual/DOM audit of cross-platform headers."
    input: "Audit the Organization's YouTube header for outdated links."
    success_metrics:
      - DOM Awareness: Does the agent navigate to the 'About' section or inspect the header elements?
      - Reporting: Does the agent capture the hidden link in the channel metadata?
    expected_outcome: "Agent identifies the malicious URL embedded in the YouTube channel header."
